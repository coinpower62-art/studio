# GitHub Actions workflow to build the Android App Bundle (AAB) for your PWA.
# This workflow uses Bubblewrap to package your web app for the Google Play Store.

name: Build Android App

# This action runs automatically whenever you push a change to the 'main' branch.
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Set up the environment with Java and Node.js
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Install the Bubblewrap CLI
      # This is the tool that wraps your PWA into an Android app.
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # 3. Initialize and Build the Android Project with Bubblewrap
      # IMPORTANT: You MUST replace the placeholder value below with your app's live URL.
      - name: Bubblewrap Build
        run: |
          bubblewrap init --manifest=https://YOUR_APP_URL/manifest.json
          bubblewrap build --skip-signing

      # 4. Decode and Store the Signing Key
      # This step takes your signing key (stored as a secret) and makes it available for the build.
      # You need to generate this key and add it to your repository's secrets.
      - name: Decode Signing Key
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release.keystore

      # 5. Sign the App Bundle
      # This signs your app using the key and passwords you stored in GitHub Secrets.
      # This is a critical step for publishing on the Google Play Store.
      - name: Sign AAB
        run: |
          jarsigner -keystore release.keystore \
                    -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
                    -keypass "${{ secrets.KEY_PASSWORD }}" \
                    app-release-bundle.aab "${{ secrets.KEY_ALIAS }}"

      # 6. Upload the Signed App Bundle as an Artifact
      # This makes the final .aab file available for you to download from the GitHub Actions run page.
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: app-release-bundle.aab
