# GitHub Actions workflow to build the Android App Bundle (AAB) for your PWA.
# This workflow uses Bubblewrap to package your web app for the Google Play Store.

name: Build Android App

# This action runs automatically whenever you push a change to the 'main' branch.
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Set up the environment with Java and Node.js
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install the Bubblewrap CLI
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      # 4. Initialize and Build the Android Project with Bubblewrap
      # IMPORTANT: Replace the placeholder below with your live Netlify URL.
      - name: Bubblewrap Build
        run: |
          bubblewrap init --manifest=https://YOUR_NETLIFY_APP_URL/manifest.json
          bubblewrap build --skip-signing

      # 5. Decode and Store the Signing Key
      - name: Decode Signing Key
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release.keystore

      # 6. Sign the App Bundle
      - name: Sign AAB
        run: |
          jarsigner -keystore release.keystore \
                    -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
                    -keypass "${{ secrets.KEY_PASSWORD }}" \
                    app-release-bundle.aab "${{ secrets.KEY_ALIAS }}"

      # 7. Upload the Signed App Bundle as an Artifact
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: app-release-bundle.aab
